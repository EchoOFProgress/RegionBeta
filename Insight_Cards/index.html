<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Insight Gallery</title>
    <meta name="description" content="Kolekce vědecky podložených vhledů pro osobní rozvoj a behaviorální změnu.">

    <!-- Shared Style Themes -->
    <link id="theme-link" rel="stylesheet" href="nike.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- Confetti for feedback -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>
    <div class="blueprint-overlay" aria-hidden="true"></div>

    <div class="top-actions">
        <button id="settings-btn" class="theme-switcher" aria-label="Nastavení témat">
            <span class="icon">⚙️</span> CONFIG_THEME
        </button>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <header class="modal-header">
                <h3>SYSTEM_THEME_SELECTOR</h3>
                <button id="close-modal" class="close-btn">&times;</button>
            </header>
            <div class="theme-grid">
                <!-- Theme buttons will be generated by script.js -->
            </div>
        </div>
    </div>

    <main class="viewport gallery-view">
        <header class="masthead">
            <div class="status-marker" aria-hidden="true">REGION_BETA</div>
            <h1>Activity <span class="version">Planner</span></h1>
            <p class="summary">Knihovna vhledů založených na datech a vědě o změně. Přestaňte chtít, začněte dělat.</p>
        </header>

        <section id="insight-cards" class="insight-container gallery-grid">
            <!-- Cards will be dynamically injected here -->
            <div class="loader-container">
                <div class="loader"></div>
                <p>Načítám vědeckou databázi...</p>
            </div>
        </section>

        <footer class="system-footer">
            <span class="footer-tag">ELITE_INSIGHT_SYSTEM_v1.1</span>
            <span class="footer-tag">AUTONOMOUS_KNOWLEDGE_UNIT</span>
        </footer>
    </main>

    <script src="cards.js"></script>
    <script src="script.js"></script>
</body>

</html>
